{% extends "base.html" %}
{% block title %}Agenda — MaruNails{% endblock %}
{% block content %}
<style>
.agenda-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
}
.fecha-nav {
    display: flex;
    align-items: center;
    gap: 10px;
}
.fecha-nav button {
    background: none;
    border: 1px solid var(--sand);
    border-radius: 6px;
    width: 34px; height: 34px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--brown);
    transition: all 0.2s;
}
.fecha-nav button:hover { background: var(--brown-pale); }
.fecha-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--brown-dark);
    min-width: 180px;
    text-align: center;
    cursor: pointer;
}
.btn-hoy {
    font-size: 11px;
    padding: 7px 14px;
    border: 1px solid var(--sand);
    border-radius: 6px;
    background: #fff;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.5px;
    transition: all 0.2s;
}
.btn-hoy:hover { background: var(--brown-pale); color: var(--brown); }

.turno-card {
    background: rgba(255,255,255,0.9);
    border: 1px solid var(--sand);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: box-shadow 0.2s;
}
.turno-card:hover { box-shadow: 0 2px 16px rgba(62,36,24,0.09); }
.turno-hora {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--brown-dark);
    min-width: 58px;
    flex-shrink: 0;
    line-height: 1;
}
.turno-hora small {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0.5px;
    margin-top: 3px;
}
.turno-body { flex: 1; min-width: 0; }
.turno-servicio {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.turno-meta {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}
.turno-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
}
.turno-precio {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--brown);
}
.badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
}
.badge-pendiente   { background: #fef3cd; color: #7a5c00; }
.badge-confirmado  { background: #edf7ee; color: #2a6635; }
.badge-llegó       { background: #e8f0fe; color: #1a56db; }
.badge-en_servicio { background: #f3e8ff; color: #6b21a8; }
.badge-finalizado  { background: #f1f5f9; color: #475569; }
.badge-cancelado_cliente { background: #fee2e2; color: #991b1b; }
.badge-cancelado_salon   { background: #fee2e2; color: #991b1b; }
.badge-no_show     { background: #fef2f2; color: #dc2626; }
.badge-reprogramado { background: #fff7ed; color: #c2410c; }
.badge-en_espera   { background: #f0f9ff; color: #0369a1; }

.estado-select {
    font-size: 11px;
    padding: 5px 8px;
    border: 1px solid var(--sand);
    border-radius: 6px;
    background: #fff;
    color: var(--text);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
}
.estado-select:focus { outline: none; border-color: var(--brown-mid); }

.empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
}
.empty-state svg { opacity: 0.25; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

.resumen-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
}
.resumen-item {
    background: rgba(255,255,255,0.85);
    border: 1px solid var(--sand);
    border-radius: 10px;
    padding: 14px 16px;
    text-align: center;
}
.resumen-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 500;
    color: var(--brown-dark);
}
.resumen-lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
}

.loading-spinner {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
}

/* ─── VIEW TOGGLE ─── */
.view-toggle {
    display: flex;
    gap: 3px;
    background: rgba(255,255,255,0.7);
    border: 1px solid var(--sand);
    border-radius: 8px;
    padding: 3px;
}
.view-btn {
    padding: 5px 14px;
    border: none;
    border-radius: 5px;
    background: none;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    color: var(--muted);
    cursor: pointer;
    font-weight: 500;
    transition: all 0.15s;
    letter-spacing: 0.3px;
}
.view-btn.active { background: var(--brown); color: #fff; }

/* ─── SEMANA ─── */
.semana-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-bottom: 24px;
}
.semana-col {
    background: rgba(255,255,255,0.75);
    border: 1px solid var(--sand);
    border-radius: 10px;
    overflow: hidden;
    min-height: 120px;
}
.semana-col-header {
    padding: 9px 8px 7px;
    text-align: center;
    background: rgba(255,255,255,0.95);
    border-bottom: 1px solid var(--sand);
}
.semana-col-header .sn { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); font-weight: 600; }
.semana-col-header .sd { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 500; color: var(--brown-dark); line-height: 1.2; }
.semana-col-header.s-hoy .sd { color: var(--brown); }
.semana-col-body { padding: 6px; }
.turno-mini {
    background: var(--brown-pale);
    border-left: 3px solid var(--brown-mid);
    border-radius: 5px;
    padding: 5px 7px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: background 0.15s;
}
.turno-mini:hover { background: #e8d5c8; }
.turno-mini .tm-hora { font-size: 9px; color: var(--muted); font-weight: 600; margin-bottom: 1px; }
.turno-mini .tm-serv { font-size: 10px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.turno-mini .tm-cli { font-size: 9px; color: var(--muted); }
.semana-vacia { font-size: 10px; color: var(--sand); text-align: center; padding: 14px 4px; }

/* ─── MES ─── */
.mes-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
.mes-day-label { text-align: center; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); font-weight: 600; padding: 6px 0; }
.mes-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.mes-cell {
    background: rgba(255,255,255,0.75);
    border: 1px solid var(--sand);
    border-radius: 7px;
    padding: 6px 5px;
    min-height: 78px;
    cursor: pointer;
    transition: background 0.15s;
    overflow: hidden;
}
.mes-cell:hover:not(.mes-empty):not(.mes-dom) { background: var(--brown-pale); }
.mes-cell.mes-hoy { border-color: var(--brown-mid); border-width: 2px; }
.mes-cell.mes-empty, .mes-cell.mes-dom { background: transparent; border-color: transparent; cursor: default; }
.mes-cell.mes-dom .mes-num { color: var(--sand); }
.mes-num { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 500; color: var(--brown-dark); margin-bottom: 3px; }
.mes-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--brown); color: #fff; border-radius: 10px; font-size: 9px; font-weight: 700; padding: 1px 6px; margin-bottom: 3px; }
.mes-servicio { font-size: 9px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ─── WALK-IN MODAL ─── */
.walkin-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(62,36,24,0.45);
    z-index: 1100;
    align-items: center;
    justify-content: center;
}
.walkin-overlay.open { display: flex; }
.walkin-panel {
    background: var(--cream);
    border-radius: 14px;
    padding: 28px 26px 22px;
    width: 420px;
    max-width: 96vw;
    box-shadow: 0 8px 48px rgba(62,36,24,0.18);
}
.walkin-panel h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--brown-dark);
    margin-bottom: 18px;
}
.wi-field { margin-bottom: 13px; }
.wi-field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 5px; font-weight: 500; }
.wi-field input, .wi-field select {
    width: 100%; box-sizing: border-box;
    padding: 9px 11px;
    border: 1px solid var(--sand);
    border-radius: 7px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    background: #fff;
    color: var(--text);
}
.wi-field input:focus, .wi-field select:focus { outline: none; border-color: var(--brown-mid); }
.wi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.wi-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
.btn-walkin-submit {
    padding: 9px 22px;
    background: var(--brown);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
}
.btn-walkin-submit:hover { background: var(--brown-dark); }
.btn-walkin-cancel {
    padding: 9px 18px;
    background: none;
    border: 1px solid var(--sand);
    border-radius: 7px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    color: var(--muted);
    cursor: pointer;
}

/* ─── HISTORIAL MODAL ─── */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(62,36,24,0.4);
    z-index: 1000;
    justify-content: flex-end;
}
.modal-overlay.open { display: flex; }
.historial-panel {
    background: var(--cream);
    width: 400px;
    max-width: 100vw;
    height: 100vh;
    overflow-y: auto;
    padding: 24px 22px;
    box-shadow: -4px 0 40px rgba(62,36,24,0.15);
}
.hpanel-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
.hpanel-top h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: var(--brown-dark); }
.hpanel-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 20px; line-height: 1; padding: 2px 6px; }
.hstats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
.hstat { background: rgba(255,255,255,0.9); border: 1px solid var(--sand); border-radius: 8px; padding: 10px 8px; text-align: center; }
.hstat-val { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: var(--brown-dark); }
.hstat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
.hcli-info { background: rgba(255,255,255,0.8); border: 1px solid var(--sand); border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; font-size: 13px; color: var(--text); }
.hcli-info strong { display: block; font-size: 15px; margin-bottom: 4px; }
.hcli-info span { color: var(--muted); font-size: 12px; }
.hitem { background: rgba(255,255,255,0.8); border: 1px solid var(--sand); border-radius: 8px; padding: 11px 13px; margin-bottom: 7px; }
.hitem-fecha { font-size: 10px; color: var(--muted); margin-bottom: 3px; text-transform: capitalize; }
.hitem-serv { font-size: 13px; font-weight: 500; color: var(--text); }
.hitem-meta { font-size: 11px; color: var(--muted); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
.hitem-meta .hestado { font-weight: 500; }

/* ─── LISTA ESPERA ─── */
.espera-section {
    margin-top: 28px;
    border-top: 1px solid var(--sand);
    padding-top: 20px;
}
.espera-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
}
.espera-titulo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px; font-weight: 500; color: var(--brown-dark);
    display: flex; align-items: center; gap: 8px;
}
.espera-badge {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--brown); color: #fff;
    border-radius: 10px; font-size: 10px; font-weight: 700;
    padding: 2px 7px; font-family: 'Inter', sans-serif;
}
.espera-card {
    background: #f0f9ff;
    border: 1px solid #bae6fd;
    border-radius: 9px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 12px;
}
.espera-body { flex: 1; }
.espera-nombre { font-size: 13px; font-weight: 500; color: var(--text); }
.espera-meta { font-size: 11px; color: #0369a1; margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
.espera-actions { display: flex; gap: 6px; flex-shrink: 0; }
.btn-espera-ok {
    padding: 5px 12px; background: #0369a1; color: #fff;
    border: none; border-radius: 6px; font-size: 11px; cursor: pointer;
    font-family: 'Inter', sans-serif; font-weight: 500;
}
.btn-espera-x {
    padding: 5px 10px; background: none;
    border: 1px solid #bae6fd; border-radius: 6px; font-size: 11px;
    color: #0369a1; cursor: pointer; font-family: 'Inter', sans-serif;
}
@media (max-width: 900px) { .semana-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 600px) {
    .resumen-bar { grid-template-columns: repeat(2, 1fr); }
    .turno-card { flex-wrap: wrap; }
    .turno-right { flex-direction: row; align-items: center; }
    .semana-grid { grid-template-columns: repeat(2, 1fr); }
    .historial-panel { width: 100vw; }
}
</style>

<div class="page-header">
    <div class="page-header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FAF6F0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
    </div>
    <div>
        <h1>Agenda</h1>
        <div class="page-header-sub">Turnos del día</div>
    </div>
</div>

<div class="agenda-top">
    <div class="fecha-nav">
        <button onclick="cambiarFecha(-1)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="fecha-display" id="fechaDisplay" onclick="irHoy()"></div>
        <button onclick="cambiarFecha(1)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
        <div class="view-toggle">
            <button class="view-btn active" id="btnDia"    onclick="setVista('dia')">Día</button>
            <button class="view-btn"        id="btnSemana" onclick="setVista('semana')">Semana</button>
            <button class="view-btn"        id="btnMes"    onclick="setVista('mes')">Mes</button>
        </div>
        <button class="btn-hoy" onclick="irHoy()">Hoy</button>
        <button class="btn-hoy" onclick="abrirWalkin()" style="background:var(--brown);color:#fff;border-color:var(--brown);font-weight:500">+ Walk-in</button>
    </div>
</div>

<div class="resumen-bar" id="resumenBar"></div>
<div id="turnosContainer"></div>
<div id="semanaContainer" style="display:none"></div>
<div id="mesContainer"   style="display:none"></div>

<!-- Lista de espera (solo vista día) -->
<div class="espera-section" id="esperaSection" style="display:none">
    <div class="espera-header">
        <div class="espera-titulo">
            Lista de espera
            <span class="espera-badge" id="esperaBadge" style="display:none">0</span>
        </div>
        <button class="btn-hoy" onclick="abrirModalEspera()" style="font-size:11px">+ Agregar</button>
    </div>
    <div id="esperaContent"><div style="color:var(--muted);font-size:12px;font-style:italic">Sin entradas activas.</div></div>
</div>

<!-- Modal lista de espera -->
<div class="walkin-overlay" id="esperaOverlay">
    <div class="walkin-panel">
        <h2>🕐 Lista de espera</h2>
        <div class="wi-row">
            <div class="wi-field">
                <label>Nombre</label>
                <input type="text" id="ewNombre" placeholder="Nombre cliente">
            </div>
            <div class="wi-field">
                <label>Teléfono</label>
                <input type="tel" id="ewTelefono" placeholder="Opcional">
            </div>
        </div>
        <div class="wi-field">
            <label>Servicio deseado</label>
            <select id="ewServicio">
                <option value="">— Cualquiera —</option>
            </select>
        </div>
        <div class="wi-row">
            <div class="wi-field">
                <label>Fecha preferida</label>
                <input type="date" id="ewFecha">
            </div>
            <div class="wi-field">
                <label>Hora preferida</label>
                <input type="time" id="ewHora">
            </div>
        </div>
        <div class="wi-field">
            <label>Notas</label>
            <input type="text" id="ewNotas" placeholder="Opcional">
        </div>
        <div id="ewError" style="color:#dc2626;font-size:12px;min-height:16px;margin-top:4px"></div>
        <div class="wi-actions">
            <button class="btn-walkin-cancel" onclick="cerrarModalEspera()">Cancelar</button>
            <button class="btn-walkin-submit" onclick="guardarEspera()">Agregar a lista</button>
        </div>
    </div>
</div>

<!-- Modal Walk-in -->
<div class="walkin-overlay" id="walkinOverlay">
    <div class="walkin-panel">
        <h2>🚶 Walk-in</h2>
        <div class="wi-row">
            <div class="wi-field">
                <label>Nombre cliente</label>
                <input type="text" id="wiNombre" placeholder="Walk in">
            </div>
            <div class="wi-field">
                <label>Teléfono</label>
                <input type="tel" id="wiTelefono" placeholder="Opcional">
            </div>
        </div>
        <div class="wi-field">
            <label>Servicio *</label>
            <select id="wiServicio" onchange="wiCargarColabs()">
                <option value="">— Seleccionar —</option>
            </select>
        </div>
        <div class="wi-field">
            <label>Colaboradora *</label>
            <select id="wiColab">
                <option value="">— Seleccionar —</option>
            </select>
        </div>
        <div class="wi-row">
            <div class="wi-field">
                <label>Hora llegada</label>
                <input type="time" id="wiHora">
            </div>
            <div class="wi-field">
                <label>Notas</label>
                <input type="text" id="wiNotas" placeholder="Opcional">
            </div>
        </div>
        <div id="wiError" style="color:#dc2626;font-size:12px;min-height:16px;margin-top:4px"></div>
        <div class="wi-actions">
            <button class="btn-walkin-cancel" onclick="cerrarWalkin()">Cancelar</button>
            <button class="btn-walkin-submit" onclick="guardarWalkin()">Registrar turno</button>
        </div>
    </div>
</div>

<!-- Panel historial -->
<div class="modal-overlay" id="historialModal" onclick="closeHistorial(event)">
    <div class="historial-panel" id="historialPanel">
        <div class="hpanel-top">
            <h2 id="hpanelNombre">Historial</h2>
            <button class="hpanel-close" onclick="closeHistorial()">✕</button>
        </div>
        <div class="hstats" id="hpanelStats"></div>
        <div class="hcli-info" id="hpanelInfo"></div>
        <div id="hpanelLista"></div>
    </div>
</div>

<script>
const MESES_L  = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const MESES_LL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_L   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const DIAS_C   = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const ESTADOS = [
    ['pendiente','Pendiente'],
    ['confirmado','Confirmado'],
    ['en_espera','En espera'],
    ['llegó','Cliente llegó'],
    ['en_servicio','En servicio'],
    ['finalizado','Finalizado'],
    ['cancelado_cliente','Cancelado cliente'],
    ['cancelado_salon','Cancelado salón'],
    ['no_show','No-show'],
    ['reprogramado','Reprogramado'],
];

let fechaActual = new Date(); fechaActual.setHours(0,0,0,0);
let vista = 'dia';

function isoFecha(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function labelFecha(d) { return `${DIAS_L[d.getDay()]} ${d.getDate()} ${MESES_L[d.getMonth()]}`; }
function cloneDate(d) { const c = new Date(d); c.setHours(0,0,0,0); return c; }

function setVista(v) {
    vista = v;
    ['dia','semana','mes'].forEach(x => document.getElementById('btn'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active', x===v));
    cargarVista();
}

function cambiarFecha(delta) {
    if (vista === 'dia')    fechaActual.setDate(fechaActual.getDate() + delta);
    else if (vista === 'semana') fechaActual.setDate(fechaActual.getDate() + delta * 7);
    else                    fechaActual.setMonth(fechaActual.getMonth() + delta);
    cargarVista();
}

function irHoy() {
    fechaActual = new Date(); fechaActual.setHours(0,0,0,0);
    cargarVista();
}

function cargarVista() {
    if (vista === 'dia')    cargarAgenda();
    else if (vista === 'semana') cargarSemana();
    else                    cargarMes();
}

// ─── VISTA DÍA ───
async function cargarAgenda() {
    document.getElementById('fechaDisplay').textContent = labelFecha(fechaActual);
    document.getElementById('turnosContainer').style.display = '';
    document.getElementById('semanaContainer').style.display = 'none';
    document.getElementById('mesContainer').style.display = 'none';
    document.getElementById('resumenBar').style.display = '';
    document.getElementById('turnosContainer').innerHTML =
        '<div class="loading-spinner"><div style="width:24px;height:24px;border:2px solid #E2D5CB;border-top-color:#5C3826;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 10px"></div>Cargando...</div>';
    document.getElementById('resumenBar').innerHTML = '';
    const res = await fetch(`/api/agenda?fecha=${isoFecha(fechaActual)}`);
    const turnos = await res.json();
    renderResumen(turnos);
    renderTurnos(turnos);
    cargarEspera();
}

function renderResumen(turnos) {
    const activos = turnos.filter(t => !['cancelado_cliente','cancelado_salon','no_show'].includes(t.estado));
    const finalizados = turnos.filter(t => t.estado === 'finalizado');
    const total = activos.reduce((s, t) => s + (t.precio || 0), 0);
    document.getElementById('resumenBar').innerHTML = `
        <div class="resumen-item"><div class="resumen-val">${activos.length}</div><div class="resumen-lbl">Turnos</div></div>
        <div class="resumen-item"><div class="resumen-val">${finalizados.length}</div><div class="resumen-lbl">Finalizados</div></div>
        <div class="resumen-item"><div class="resumen-val">$${total.toLocaleString()}</div><div class="resumen-lbl">Facturado</div></div>
        <div class="resumen-item"><div class="resumen-val">${turnos.filter(t=>t.estado==='no_show').length}</div><div class="resumen-lbl">No-shows</div></div>
    `;
}

function renderTurnos(turnos) {
    const el = document.getElementById('turnosContainer');
    if (!turnos.length) {
        el.innerHTML = `<div class="empty-state">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <p>No hay turnos para este día.</p>
        </div>`;
        return;
    }
    el.innerHTML = turnos.map(t => {
        const cli = t.clientes_reservas;
        const colab = t.colaboradoras;
        const serv = t.servicios;
        const nombre = cli ? `${cli.nombre || ''} ${cli.apellido || ''}`.trim() : '—';
        const tel = cli?.telefono || '';
        const cliId = cli?.id;
        const colabor = colab?.nombre || '—';
        const servicio = serv?.nombre || '—';
        const hora = (t.hora_inicio || '').slice(0,5);
        const horaFin = (t.hora_fin || '').slice(0,5);
        return `
        <div class="turno-card" id="card${t.id}">
            <div class="turno-hora">${hora}<small>→ ${horaFin}</small></div>
            <div class="turno-body">
                <div class="turno-servicio">${servicio}</div>
                <div class="turno-meta">
                    <span style="cursor:pointer;text-decoration:underline;text-underline-offset:2px" onclick="openHistorial(${cliId})">${nombre}</span>
                    ${tel ? `<a href="${waLink(tel, nombre, servicio, hora, isoFecha(fechaActual))}" target="_blank" style="color:#25D366;text-decoration:none;display:inline-flex;align-items:center;gap:3px" title="WhatsApp">${tel} <svg width="11" height="11" viewBox="0 0 32 32" fill="#25D366"><path d="M16 0C7.163 0 0 7.163 0 16c0 2.822.736 5.469 2.027 7.769L0 32l8.469-2.002A15.93 15.93 0 0016 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm0 29.333a13.27 13.27 0 01-6.771-1.853l-.485-.288-5.027 1.188 1.229-4.886-.317-.501A13.254 13.254 0 012.667 16C2.667 8.636 8.636 2.667 16 2.667S29.333 8.636 29.333 16 23.364 29.333 16 29.333zm7.262-9.874c-.398-.199-2.354-1.162-2.719-1.295-.365-.133-.631-.199-.897.199-.266.398-1.031 1.295-1.264 1.561-.232.266-.465.299-.863.1-.398-.199-1.68-.619-3.2-1.977-1.183-1.056-1.981-2.36-2.213-2.758-.232-.398-.025-.613.175-.811.179-.178.398-.465.597-.698.199-.232.266-.398.398-.664.133-.266.066-.499-.033-.698-.1-.199-.897-2.162-1.229-2.96-.324-.777-.653-.671-.897-.683-.232-.012-.499-.015-.765-.015s-.698.1-.864.265c-.166.166-.896.877-.896 2.138s.917 2.481 1.045 2.65c.133.166 1.793 2.75 4.352 3.858.608.263 1.082.42 1.451.537.61.195 1.165.168 1.604.102.489-.073 1.506-.616 1.719-1.211.213-.598.213-1.109.149-1.211-.066-.1-.266-.166-.564-.299z"/></svg></a>` : ''}
                    <span>${colabor}</span>
                    ${t.canal !== 'web' ? `<span>${t.canal}</span>` : ''}
                </div>
                ${t.notas ? `<div style="font-size:12px;color:var(--muted);margin-top:5px;font-style:italic">${t.notas}</div>` : ''}
            </div>
            <div class="turno-right">
                <span class="badge badge-${t.estado}">${estadoLabel(t.estado)}</span>
                ${t.precio ? `<div class="turno-precio">$${t.precio.toLocaleString()}</div>` : ''}
                <select class="estado-select" onchange="cambiarEstado(${t.id}, this.value)">
                    ${ESTADOS.map(([val, lbl]) => `<option value="${val}" ${t.estado === val ? 'selected' : ''}>${lbl}</option>`).join('')}
                </select>
            </div>
        </div>
        `;
    }).join('');
}

function estadoLabel(e) {
    const map = Object.fromEntries(ESTADOS);
    return map[e] || e;
}

async function cambiarEstado(id, estado) {
    await fetch(`/api/turno/${id}/estado`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ estado })
    });
    // Refrescar badge sin recargar toda la lista
    const card = document.getElementById(`card${id}`);
    if (card) {
        const badge = card.querySelector('.badge');
        badge.className = `badge badge-${estado}`;
        badge.textContent = estadoLabel(estado);
    }
}

function waLink(tel, nombre, servicio, hora, fecha) {
    const phone = tel.replace(/\D/g, '');
    const msg = encodeURIComponent(
        `Hola ${nombre}! Te recordamos tu turno para *${servicio}* el ${fecha} a las ${hora} hs en Maru Nails. ¡Te esperamos! 💅`
    );
    return `https://wa.me/${phone}?text=${msg}`;
}

// ─── VISTA SEMANA ───
async function cargarSemana() {
    document.getElementById('turnosContainer').style.display = 'none';
    document.getElementById('mesContainer').style.display = 'none';
    document.getElementById('resumenBar').style.display = 'none';
    document.getElementById('semanaContainer').style.display = '';
    document.getElementById('semanaContainer').innerHTML =
        '<div class="loading-spinner"><div style="width:24px;height:24px;border:2px solid #E2D5CB;border-top-color:#5C3826;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 10px"></div>Cargando...</div>';

    // Calcular lunes de la semana actual
    const lunes = cloneDate(fechaActual);
    const dow = lunes.getDay() === 0 ? 6 : lunes.getDay() - 1;
    lunes.setDate(lunes.getDate() - dow);
    const sabado = cloneDate(lunes); sabado.setDate(lunes.getDate() + 5);
    document.getElementById('fechaDisplay').textContent =
        `${lunes.getDate()} – ${sabado.getDate()} ${MESES_L[sabado.getMonth()]}`;

    const res = await fetch(`/api/agenda?desde=${isoFecha(lunes)}&hasta=${isoFecha(sabado)}`);
    const turnos = await res.json();

    let html = '<div class="semana-grid">';
    for (let i = 0; i < 6; i++) {
        const dia = cloneDate(lunes); dia.setDate(lunes.getDate() + i);
        const isoD = isoFecha(dia);
        const today = new Date(); today.setHours(0,0,0,0);
        const esHoy = dia.toDateString() === today.toDateString();
        const del_dia = turnos.filter(t => t.fecha === isoD);
        html += `
        <div class="semana-col">
            <div class="semana-col-header${esHoy ? ' s-hoy' : ''}">
                <div class="sn">${DIAS_C[dia.getDay()]}</div>
                <div class="sd">${dia.getDate()} ${MESES_L[dia.getMonth()]}</div>
            </div>
            <div class="semana-col-body">
                ${del_dia.length ? del_dia.map(t => {
                    const cli = t.clientes_reservas;
                    const nombre = cli ? `${cli.nombre||''} ${cli.apellido||''}`.trim() : '—';
                    const cliId = cli?.id;
                    return `<div class="turno-mini" onclick="openHistorial(${cliId})">
                        <div class="tm-hora">${(t.hora_inicio||'').slice(0,5)}</div>
                        <div class="tm-serv">${t.servicios?.nombre||'—'}</div>
                        <div class="tm-cli">${nombre}</div>
                    </div>`;
                }).join('') : '<div class="semana-vacia">—</div>'}
            </div>
        </div>`;
    }
    html += '</div>';
    document.getElementById('semanaContainer').innerHTML = html;
}

// ─── VISTA MES ───
async function cargarMes() {
    document.getElementById('turnosContainer').style.display = 'none';
    document.getElementById('semanaContainer').style.display = 'none';
    document.getElementById('resumenBar').style.display = 'none';
    document.getElementById('mesContainer').style.display = '';
    document.getElementById('mesContainer').innerHTML =
        '<div class="loading-spinner"><div style="width:24px;height:24px;border:2px solid #E2D5CB;border-top-color:#5C3826;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 10px"></div>Cargando...</div>';

    const y = fechaActual.getFullYear(), m = fechaActual.getMonth();
    document.getElementById('fechaDisplay').textContent = `${MESES_LL[m]} ${y}`;
    const primero = new Date(y, m, 1);
    const ultimo  = new Date(y, m+1, 0);

    const res = await fetch(`/api/agenda?desde=${isoFecha(primero)}&hasta=${isoFecha(ultimo)}`);
    const turnos = await res.json();

    // Agrupar por fecha
    const porFecha = {};
    turnos.forEach(t => { (porFecha[t.fecha] = porFecha[t.fecha]||[]).push(t); });

    const today = new Date(); today.setHours(0,0,0,0);
    let startDow = primero.getDay() === 0 ? 6 : primero.getDay() - 1;

    let html = '<div class="mes-header">';
    ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].forEach(d => html += `<div class="mes-day-label">${d}</div>`);
    html += '</div><div class="mes-grid">';
    for (let i = 0; i < startDow; i++) html += '<div class="mes-cell mes-empty"></div>';
    for (let d = 1; d <= ultimo.getDate(); d++) {
        const dt   = new Date(y, m, d);
        const iso  = isoFecha(dt);
        const esDom = dt.getDay() === 0;
        const esHoy = dt.toDateString() === today.toDateString();
        const ts    = porFecha[iso] || [];
        let cls = 'mes-cell' + (esDom ? ' mes-dom' : '') + (esHoy ? ' mes-hoy' : '');
        const onclick = !esDom ? `onclick="irDia('${iso}')"` : '';
        html += `<div class="${cls}" ${onclick}>
            <div class="mes-num">${d}</div>
            ${ts.length ? `<div class="mes-badge">${ts.length}</div>` : ''}
            ${ts.slice(0,2).map(t => `<div class="mes-servicio">${(t.servicios?.nombre||'').split(' ')[0]}</div>`).join('')}
        </div>`;
    }
    html += '</div>';
    document.getElementById('mesContainer').innerHTML = html;
}

function irDia(iso) {
    fechaActual = new Date(iso + 'T12:00:00');
    fechaActual.setHours(0,0,0,0);
    setVista('dia');
}

// ─── HISTORIAL ───
async function openHistorial(clienteId) {
    if (!clienteId) return;
    const res = await fetch(`/api/cliente/${clienteId}/historial`);
    const data = await res.json();
    const { cliente, turnos } = data;

    document.getElementById('hpanelNombre').textContent = `${cliente.nombre} ${cliente.apellido||''}`.trim();

    const bloqueadoBadge = cliente.bloqueado
        ? `<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:9px 13px;margin-bottom:10px;font-size:12px;color:#dc2626;font-weight:600">
            ⛔ Cliente bloqueado${cliente.motivo_bloqueo ? ': ' + cliente.motivo_bloqueo : ''}
           </div>` : '';
    const alergiasBlock = cliente.alergias
        ? `<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:9px 13px;margin-bottom:10px">
            <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#dc2626">⚠ Alergias / notas especiales</span>
            <p style="font-size:12px;color:#991b1b;margin-top:4px">${cliente.alergias}</p>
           </div>` : '';

    document.getElementById('hpanelInfo').innerHTML = `
        ${bloqueadoBadge}
        ${alergiasBlock}
        <strong>${cliente.nombre} ${cliente.apellido||''}</strong>
        <span>${cliente.telefono}</span>
        ${cliente.email ? `<br><span>${cliente.email}</span>` : ''}
        ${cliente.idioma && cliente.idioma !== 'es' ? `<br><span>Idioma: ${cliente.idioma}</span>` : ''}
        <br><button onclick="editarAlergiasCliente(${cliente.id})"
            style="margin-top:8px;padding:5px 12px;border:1px solid var(--sand);border-radius:6px;background:#fff;font-size:11px;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif">
            ✏ Editar alergias
        </button>
    `;
    const activos = turnos.filter(t => !['cancelado_cliente','cancelado_salon','no_show'].includes(t.estado));
    const total = activos.reduce((s,t) => s+(t.precio||0), 0);
    const ult = turnos[0];
    document.getElementById('hpanelStats').innerHTML = `
        <div class="hstat"><div class="hstat-val">${activos.length}</div><div class="hstat-lbl">Visitas</div></div>
        <div class="hstat"><div class="hstat-val">$${total.toLocaleString()}</div><div class="hstat-lbl">Total</div></div>
        <div class="hstat"><div class="hstat-val">${ult ? new Date(ult.fecha+'T12:00').toLocaleDateString('es-MX',{day:'numeric',month:'short'}) : '—'}</div><div class="hstat-lbl">Última visita</div></div>
    `;
    document.getElementById('hpanelLista').innerHTML = turnos.length ? turnos.map(t => {
        const fechaF = new Date(t.fecha+'T12:00').toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
        return `<div class="hitem">
            <div class="hitem-fecha">${fechaF}</div>
            <div class="hitem-serv">${t.servicios?.nombre||'—'}</div>
            <div class="hitem-meta">
                <span>${t.colaboradoras?.nombre||''}</span>
                ${t.precio ? `<span>$${t.precio.toLocaleString()}</span>` : ''}
                <span class="hestado">${estadoLabel(t.estado)}</span>
            </div>
            ${t.notas ? `<div style="font-size:11px;color:var(--muted);margin-top:4px;font-style:italic">${t.notas}</div>` : ''}
        </div>`;
    }).join('') : '<p style="font-size:13px;color:var(--muted);text-align:center;padding:20px">Sin turnos registrados.</p>';

    document.getElementById('historialModal').classList.add('open');
}

function closeHistorial(e) {
    if (e && e.target !== document.getElementById('historialModal')) return;
    document.getElementById('historialModal').classList.remove('open');
}

// ─── WALK-IN ───
let wiServicios = [];

async function abrirWalkin() {
    document.getElementById('wiError').textContent = '';
    document.getElementById('wiNombre').value = '';
    document.getElementById('wiTelefono').value = '';
    document.getElementById('wiNotas').value = '';
    // Hora actual
    const now = new Date();
    document.getElementById('wiHora').value =
        `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    // Cargar servicios si no están
    if (!wiServicios.length) {
        const r = await fetch('/api/servicios');
        wiServicios = await r.json();
        const sel = document.getElementById('wiServicio');
        sel.innerHTML = '<option value="">— Seleccionar —</option>' +
            wiServicios.map(s => `<option value="${s.id}">${s.nombre}</option>`).join('');
    }
    document.getElementById('wiColab').innerHTML = '<option value="">— Seleccionar servicio primero —</option>';
    document.getElementById('walkinOverlay').classList.add('open');
    document.getElementById('wiServicio').focus();
}

async function wiCargarColabs() {
    const servId = document.getElementById('wiServicio').value;
    const sel = document.getElementById('wiColab');
    if (!servId) { sel.innerHTML = '<option value="">— Seleccionar servicio primero —</option>'; return; }
    sel.innerHTML = '<option value="">Cargando...</option>';
    const r = await fetch(`/api/colaboradoras?servicio_id=${servId}`);
    const colabs = await r.json();
    sel.innerHTML = '<option value="">— Seleccionar —</option>' +
        colabs.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
}

function cerrarWalkin() {
    document.getElementById('walkinOverlay').classList.remove('open');
}

async function guardarWalkin() {
    const servId  = document.getElementById('wiServicio').value;
    const colabId = document.getElementById('wiColab').value;
    const errEl   = document.getElementById('wiError');
    if (!servId || !colabId) { errEl.textContent = 'Seleccioná servicio y colaboradora.'; return; }
    errEl.textContent = '';

    const btn = document.querySelector('.btn-walkin-submit');
    btn.disabled = true; btn.textContent = 'Guardando...';

    const res = await fetch('/api/walkin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            nombre:        document.getElementById('wiNombre').value.trim() || 'Walk in',
            telefono:      document.getElementById('wiTelefono').value.trim(),
            servicio_id:   servId,
            colaboradora_id: colabId,
            hora:          document.getElementById('wiHora').value,
            notas:         document.getElementById('wiNotas').value.trim(),
        })
    });
    const data = await res.json();
    btn.disabled = false; btn.textContent = 'Registrar turno';

    if (data.error) { errEl.textContent = data.error; return; }
    cerrarWalkin();
    // Volver a la vista Día de hoy y recargar
    fechaActual = new Date(); fechaActual.setHours(0,0,0,0);
    setVista('dia');
}

// ─── EDITAR ALERGIAS DESDE HISTORIAL ───
async function editarAlergiasCliente(cid) {
    const info = document.getElementById('hpanelInfo');
    const actual = info.querySelector('p')?.textContent || '';
    const nueva = prompt('Alergias / notas especiales:', actual);
    if (nueva === null) return;
    const r = await fetch(`/api/cliente/${cid}/perfil`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ alergias: nueva })
    });
    if ((await r.json()).success) openHistorial(cid);
}

// ─── LISTA DE ESPERA ───
async function cargarEspera() {
    const r = await fetch('/api/lista-espera');
    const lista = await r.json();
    const section = document.getElementById('esperaSection');
    const badge   = document.getElementById('esperaBadge');
    const content = document.getElementById('esperaContent');
    section.style.display = '';
    if (!lista.length) {
        badge.style.display = 'none';
        content.innerHTML = '<div style="color:var(--muted);font-size:12px;font-style:italic">Sin entradas activas.</div>';
        return;
    }
    badge.style.display = '';
    badge.textContent = lista.length;
    content.innerHTML = lista.map(e => {
        const serv   = e.servicios?.nombre || 'Cualquier servicio';
        const colab  = e.colaboradoras?.nombre || '';
        const nombre = e.nombre || e.telefono || '—';
        const tel    = e.telefono || '';
        const fecha  = e.fecha_preferida ? new Date(e.fecha_preferida + 'T12:00').toLocaleDateString('es-MX', {day:'numeric',month:'short'}) : '';
        const hora   = e.hora_preferida ? e.hora_preferida.slice(0,5) : '';
        return `<div class="espera-card">
            <div class="espera-body">
                <div class="espera-nombre">${nombre}</div>
                <div class="espera-meta">
                    <span>${serv}</span>
                    ${colab ? `<span>${colab}</span>` : ''}
                    ${fecha ? `<span>${fecha}${hora ? ' ' + hora : ''}</span>` : ''}
                    ${e.notas ? `<span style="font-style:italic">${e.notas}</span>` : ''}
                </div>
            </div>
            <div class="espera-actions">
                <button class="btn-espera-ok" title="Asignado / resuelto" onclick="cambiarEstadoEspera(${e.id},'asignado')">✓</button>
                <button class="btn-espera-x"  title="Cancelar"          onclick="cambiarEstadoEspera(${e.id},'cancelado')">✕</button>
            </div>
        </div>`;
    }).join('');
}

async function cambiarEstadoEspera(id, estado) {
    await fetch(`/api/lista-espera/${id}/estado`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ estado })
    });
    cargarEspera();
}

function abrirModalEspera() {
    document.getElementById('ewError').textContent = '';
    ['ewNombre','ewTelefono','ewNotas'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('ewFecha').value = isoFecha(fechaActual);
    document.getElementById('ewHora').value  = '';
    if (!wiServicios.length) {
        fetch('/api/servicios').then(r => r.json()).then(s => {
            wiServicios = s;
            document.getElementById('ewServicio').innerHTML = '<option value="">— Cualquiera —</option>' +
                s.map(x => `<option value="${x.id}">${x.nombre}</option>`).join('');
        });
    } else {
        document.getElementById('ewServicio').innerHTML = '<option value="">— Cualquiera —</option>' +
            wiServicios.map(x => `<option value="${x.id}">${x.nombre}</option>`).join('');
    }
    document.getElementById('esperaOverlay').classList.add('open');
}

function cerrarModalEspera() { document.getElementById('esperaOverlay').classList.remove('open'); }

async function guardarEspera() {
    const nombre = document.getElementById('ewNombre').value.trim();
    const tel    = document.getElementById('ewTelefono').value.trim();
    const errEl  = document.getElementById('ewError');
    if (!nombre && !tel) { errEl.textContent = 'Ingresá nombre o teléfono.'; return; }
    errEl.textContent = '';
    const btn = document.querySelector('#esperaOverlay .btn-walkin-submit');
    btn.disabled = true; btn.textContent = 'Guardando...';
    const r = await fetch('/api/lista-espera', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            nombre,
            telefono:        tel,
            servicio_id:     document.getElementById('ewServicio').value || null,
            fecha_preferida: document.getElementById('ewFecha').value || null,
            hora_preferida:  document.getElementById('ewHora').value || null,
            notas:           document.getElementById('ewNotas').value.trim(),
        })
    });
    const data = await r.json();
    btn.disabled = false; btn.textContent = 'Agregar a lista';
    if (data.error) { errEl.textContent = data.error; return; }
    cerrarModalEspera();
    cargarEspera();
}

// init
cargarAgenda();
</script>
{% endblock %}
