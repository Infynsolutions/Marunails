<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservar turno — Maru Nails</title>
<meta name="theme-color" content="#3E2418">
<link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-icon.png') }}">
<link rel="shortcut icon" href="{{ url_for('static', filename='apple-icon.png') }}">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --brown:      #5C3826;
    --brown-dark: #3E2418;
    --brown-mid:  #7A4F38;
    --brown-pale: #F5EDE6;
    --cream:      #FAF6F0;
    --bg:         #F2EBE3;
    --sand:       #E2D5CB;
    --text:       #2A1F1A;
    --muted:      #9E8878;
    --radius:     10px;
    --shadow:     0 2px 20px rgba(62,36,24,0.10);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
.header {
    background: var(--brown-dark);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 20px rgba(62,36,24,0.30);
}
.header img { height: 48px; width: auto; }

/* ─── PROGRESS BAR ─── */
.progress-wrap {
    background: var(--brown-dark);
    padding: 0 24px 20px;
    display: flex;
    justify-content: center;
}
.progress {
    display: flex;
    align-items: center;
    gap: 0;
    max-width: 480px;
    width: 100%;
}
.step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.45);
    font-size: 11px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.3s;
}
.step-dot.active { background: var(--brown-pale); color: var(--brown-dark); }
.step-dot.done { background: #a07055; color: #fff; }
.step-line {
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.15);
}

/* ─── MAIN ─── */
.wrap {
    max-width: 520px;
    margin: 0 auto;
    padding: 28px 20px 60px;
}

/* ─── STEP HEADER ─── */
.step-header { margin-bottom: 22px; }
.step-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
}
.step-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 500;
    color: var(--brown-dark);
    line-height: 1.1;
}

/* ─── CATEGORY TABS ─── */
.cat-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
}
.cat-tab {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--sand);
    background: #fff;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
}
.cat-tab.active {
    background: var(--brown-dark);
    color: var(--cream);
    border-color: var(--brown-dark);
}

/* ─── SERVICE LIST ─── */
.service-list { display: flex; flex-direction: column; gap: 10px; }
.service-card {
    background: #fff;
    border: 1.5px solid var(--sand);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
}
.service-card:hover { border-color: var(--brown-mid); box-shadow: var(--shadow); }
.service-card.selected { border-color: var(--brown); background: var(--brown-pale); }
.service-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
}
.service-meta {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 10px;
}
.service-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--brown);
    white-space: nowrap;
    flex-shrink: 0;
}

/* ─── STAFF LIST ─── */
.staff-list { display: flex; flex-direction: column; gap: 10px; }
.staff-card {
    background: #fff;
    border: 1.5px solid var(--sand);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 14px;
}
.staff-card:hover { border-color: var(--brown-mid); box-shadow: var(--shadow); }
.staff-card.selected { border-color: var(--brown); background: var(--brown-pale); }
.staff-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--brown);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
.staff-name { font-size: 15px; font-weight: 500; color: var(--text); }
.staff-rol { font-size: 12px; color: var(--muted); margin-top: 2px; }
.staff-any .staff-avatar { background: var(--brown-mid); font-size: 22px; }

/* ─── CALENDAR ─── */
.calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
}
.cal-nav {
    background: none;
    border: 1px solid var(--sand);
    border-radius: 6px;
    width: 34px; height: 34px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--brown);
    transition: all 0.2s;
}
.cal-nav:hover { background: var(--brown-pale); }
.cal-month {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--brown-dark);
    text-align: center;
}
.cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
}
.cal-day-label {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 6px 0;
}
.cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    border: 1.5px solid transparent;
}
.cal-day:hover:not(.disabled):not(.empty) { background: var(--brown-pale); border-color: var(--brown-mid); }
.cal-day.selected { background: var(--brown-dark); color: var(--cream); border-color: var(--brown-dark); font-weight: 600; }
.cal-day.today { border-color: var(--brown-mid); color: var(--brown); font-weight: 600; }
.cal-day.disabled { color: var(--sand); cursor: default; }
.cal-day.empty { cursor: default; }

/* ─── TIME SLOTS ─── */
.slots-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 8px;
}
.slot {
    padding: 10px 6px;
    border: 1.5px solid var(--sand);
    border-radius: 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: #fff;
    color: var(--text);
    transition: all 0.2s;
}
.slot:hover { border-color: var(--brown-mid); background: var(--brown-pale); }
.slot.selected { background: var(--brown-dark); color: var(--cream); border-color: var(--brown-dark); }
.no-slots {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 32px 0;
}

/* ─── FORM ─── */
.form-group { margin-bottom: 18px; }
.form-label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
}
.form-label .req { color: #a83232; }
.form-input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--sand);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    background: #fff;
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
}
.form-input:focus {
    outline: none;
    border-color: var(--brown-mid);
    box-shadow: 0 0 0 3px rgba(92,56,38,0.10);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.checkbox-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-top: 6px;
}
.checkbox-row input { margin-top: 2px; accent-color: var(--brown); }
.checkbox-row label { font-size: 12px; color: var(--muted); line-height: 1.5; }

/* ─── SUMMARY BOX ─── */
.summary-box {
    background: #fff;
    border: 1px solid var(--sand);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 20px;
}
.summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid var(--sand);
    font-size: 13px;
}
.summary-row:last-child { border-bottom: none; }
.summary-row .label { color: var(--muted); }
.summary-row .val { font-weight: 500; color: var(--text); text-align: right; }
.summary-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--brown);
    font-weight: 600;
}

/* ─── CONFIRM ─── */
.confirm-box {
    text-align: center;
    padding: 40px 24px;
}
.confirm-icon {
    width: 64px; height: 64px;
    background: #edf7ee;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
}
.confirm-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--brown-dark);
    margin-bottom: 10px;
}
.confirm-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }

/* ─── BUTTONS ─── */
.btn {
    width: 100%;
    padding: 14px;
    border-radius: var(--radius);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    margin-top: 10px;
}
.btn-primary {
    background: var(--brown-dark);
    color: var(--cream);
    box-shadow: 0 2px 12px rgba(62,36,24,0.28);
}
.btn-primary:hover { opacity: 0.88; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-back {
    background: none;
    color: var(--muted);
    border: 1px solid var(--sand);
    margin-top: 6px;
}
.btn-back:hover { background: var(--brown-pale); color: var(--brown); }
.btn-whatsapp {
    background: #25D366;
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.2s;
}
.btn-whatsapp:hover { opacity: 0.88; }

/* ─── LOADING ─── */
.loading {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 13px;
}
.spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--sand);
    border-top-color: var(--brown);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── STEP VISIBILITY ─── */
.step { display: none; }
.step.active { display: block; }

@media (max-width: 480px) {
    .slots-grid { grid-template-columns: repeat(3, 1fr); }
    .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
    <img src="{{ url_for('static', filename='Logotipo principal_Mesa de trabajo 1.PNG') }}" alt="Maru Nails">
</div>

<div class="progress-wrap">
    <div class="progress">
        <div class="step-dot active" id="dot1">1</div>
        <div class="step-line"></div>
        <div class="step-dot" id="dot2">2</div>
        <div class="step-line"></div>
        <div class="step-dot" id="dot3">3</div>
        <div class="step-line"></div>
        <div class="step-dot" id="dot4">4</div>
        <div class="step-line"></div>
        <div class="step-dot" id="dot5">5</div>
    </div>
</div>

<div class="wrap">

    <!-- ── STEP 1: SERVICIO ── -->
    <div class="step active" id="step1">
        <div class="step-header">
            <div class="step-label">Paso 1 de 5</div>
            <div class="step-title">¿Qué servicio buscás?</div>
        </div>
        <div class="cat-tabs" id="catTabs"></div>
        <div class="service-list" id="serviceList">
            <div class="loading"><div class="spinner"></div>Cargando servicios...</div>
        </div>
        <button class="btn btn-primary" id="btnStep1" disabled onclick="goStep(2)">Continuar</button>
    </div>

    <!-- ── STEP 2: PROFESIONAL ── -->
    <div class="step" id="step2">
        <div class="step-header">
            <div class="step-label">Paso 2 de 5</div>
            <div class="step-title">¿Con quién querés atenderte?</div>
        </div>
        <div class="staff-list" id="staffList">
            <div class="loading"><div class="spinner"></div>Cargando...</div>
        </div>
        <button class="btn btn-primary" id="btnStep2" disabled onclick="goStep(3)">Continuar</button>
        <button class="btn btn-back" onclick="goStep(1)">Volver</button>
    </div>

    <!-- ── STEP 3: FECHA ── -->
    <div class="step" id="step3">
        <div class="step-header">
            <div class="step-label">Paso 3 de 5</div>
            <div class="step-title">Elegí una fecha</div>
        </div>
        <div class="calendar-header">
            <button class="cal-nav" onclick="prevMonth()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="cal-month" id="calMonth"></div>
            <button class="cal-nav" onclick="nextMonth()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <button class="btn btn-primary" id="btnStep3" disabled onclick="goStep(4)">Continuar</button>
        <button class="btn btn-back" onclick="goStep(2)">Volver</button>
    </div>

    <!-- ── STEP 4: HORARIO ── -->
    <div class="step" id="step4">
        <div class="step-header">
            <div class="step-label">Paso 4 de 5</div>
            <div class="step-title">Elegí un horario</div>
        </div>
        <div id="slotsContainer">
            <div class="loading"><div class="spinner"></div>Buscando disponibilidad...</div>
        </div>
        <button class="btn btn-primary" id="btnStep4" disabled onclick="goStep(5)">Continuar</button>
        <button class="btn btn-back" onclick="goStep(3)">Volver</button>
    </div>

    <!-- ── STEP 5: DATOS ── -->
    <div class="step" id="step5">
        <div class="step-header">
            <div class="step-label">Paso 5 de 5</div>
            <div class="step-title">Tus datos</div>
        </div>

        <div class="summary-box" id="summaryBox"></div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Nombre <span class="req">*</span></label>
                <input class="form-input" id="fNombre" type="text" placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label class="form-label">Apellido</label>
                <input class="form-input" id="fApellido" type="text" placeholder="Tu apellido">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Teléfono <span class="req">*</span></label>
            <input class="form-input" id="fTel" type="tel" placeholder="+52 984 000 0000">
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" id="fEmail" type="email" placeholder="tu@email.com">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Idioma / Language</label>
                <select class="form-input" id="fIdioma">
                    <option value="es">Español</option>
                    <option value="en">English</option>
                    <option value="pt">Português</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Fecha de nacimiento <span style="font-size:10px;color:var(--muted);font-weight:400">(opcional)</span></label>
                <input class="form-input" id="fNacimiento" type="date">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Notas (opcional)</label>
            <input class="form-input" id="fNotas" type="text" placeholder="Alergias, preferencias, etc.">
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="fPoliticas">
            <label for="fPoliticas">Acepto las políticas del salón y entiendo que la reserva puede cancelarse con 24 hs de anticipación.</label>
        </div>

        <button class="btn btn-primary" id="btnConfirmar" onclick="confirmar()">Confirmar reserva</button>
        <button class="btn btn-back" onclick="goStep(4)">Volver</button>
    </div>

    <!-- ── CONFIRMACIÓN ── -->
    <div class="step" id="stepOk">
        <div class="confirm-box">
            <div class="confirm-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4a8c5c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="confirm-title">¡Reserva confirmada!</div>
            <div class="confirm-sub" id="confirmText"></div>
            <a id="btnWhatsapp" href="#" target="_blank" class="btn btn-whatsapp" style="margin-top:20px;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none">
                <svg width="18" height="18" viewBox="0 0 32 32" fill="currentColor"><path d="M16 0C7.163 0 0 7.163 0 16c0 2.822.736 5.469 2.027 7.769L0 32l8.469-2.002A15.93 15.93 0 0016 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm0 29.333a13.27 13.27 0 01-6.771-1.853l-.485-.288-5.027 1.188 1.229-4.886-.317-.501A13.254 13.254 0 012.667 16C2.667 8.636 8.636 2.667 16 2.667S29.333 8.636 29.333 16 23.364 29.333 16 29.333zm7.262-9.874c-.398-.199-2.354-1.162-2.719-1.295-.365-.133-.631-.199-.897.199-.266.398-1.031 1.295-1.264 1.561-.232.266-.465.299-.863.1-.398-.199-1.68-.619-3.2-1.977-1.183-1.056-1.981-2.36-2.213-2.758-.232-.398-.025-.613.175-.811.179-.178.398-.465.597-.698.199-.232.266-.398.398-.664.133-.266.066-.499-.033-.698-.1-.199-.897-2.162-1.229-2.96-.324-.777-.653-.671-.897-.683-.232-.012-.499-.015-.765-.015s-.698.1-.864.265c-.166.166-.896.877-.896 2.138s.917 2.481 1.045 2.65c.133.166 1.793 2.75 4.352 3.858.608.263 1.082.42 1.451.537.61.195 1.165.168 1.604.102.489-.073 1.506-.616 1.719-1.211.213-.598.213-1.109.149-1.211-.066-.1-.266-.166-.564-.299z"/></svg>
                Confirmar por WhatsApp
            </a>
            <button class="btn btn-primary" style="margin-top:12px" onclick="nueva()">Hacer otra reserva</button>
        </div>
    </div>

</div>

<script>
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_LABEL = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const SALON_WA = '529842084998';

let state = {
    currentStep: 1,
    servicios: [],
    catActiva: null,
    servicioSel: null,
    colaboradoraSel: null,
    fechaSel: null,
    horaSel: null,
    slotsData: [],
    calYear: new Date().getFullYear(),
    calMonth: new Date().getMonth(),
};

// ─── INIT ───
async function init() {
    const res = await fetch('/api/servicios');
    state.servicios = await res.json();
    renderCats();
    const cats = [...new Set(state.servicios.map(s => s.categoria))];
    selectCat(cats[0]);
}

// ─── CATEGORÍAS ───
function renderCats() {
    const cats = [...new Set(state.servicios.map(s => s.categoria))];
    const el = document.getElementById('catTabs');
    el.innerHTML = cats.map(c =>
        `<div class="cat-tab" onclick="selectCat('${c}')">${c}</div>`
    ).join('');
}

function selectCat(cat) {
    state.catActiva = cat;
    document.querySelectorAll('.cat-tab').forEach(t => {
        t.classList.toggle('active', t.textContent === cat);
    });
    renderServices();
}

function renderServices() {
    const filtered = state.servicios.filter(s => s.categoria === state.catActiva);
    const el = document.getElementById('serviceList');
    el.innerHTML = filtered.map(s => `
        <div class="service-card ${state.servicioSel?.id === s.id ? 'selected' : ''}"
             onclick="selectService(${s.id})">
            <div>
                <div class="service-name">${s.nombre}</div>
                <div class="service-meta">
                    <span>${durStr(s.duracion_min)}</span>
                </div>
            </div>
            <div class="service-price">${s.precio_hasta ? 'desde ' : ''}$${s.precio_desde.toLocaleString()} MXN</div>
        </div>
    `).join('');
}

function selectService(id) {
    state.servicioSel = state.servicios.find(s => s.id === id);
    renderServices();
    document.getElementById('btnStep1').disabled = false;
}

// ─── STAFF ───
async function loadStaff() {
    const el = document.getElementById('staffList');
    el.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';
    const res = await fetch(`/api/colaboradoras`);
    const colabs = await res.json();
    el.innerHTML = `
        <div class="staff-card staff-any ${state.colaboradoraSel === 'any' ? 'selected' : ''}"
             onclick="selectStaff('any', 'Cualquiera disponible')">
            <div class="staff-avatar">✦</div>
            <div>
                <div class="staff-name">Cualquiera disponible</div>
                <div class="staff-rol">Asignar automáticamente</div>
            </div>
        </div>
    ` + colabs.map(c => `
        <div class="staff-card ${state.colaboradoraSel === c.id ? 'selected' : ''}"
             onclick="selectStaff(${c.id}, '${c.nombre}')">
            <div class="staff-avatar">${c.nombre.charAt(0)}</div>
            <div>
                <div class="staff-name">${c.nombre}</div>
                <div class="staff-rol">${c.rol || ''}</div>
            </div>
        </div>
    `).join('');
}

function selectStaff(id, nombre) {
    state.colaboradoraSel = id;
    state.colaboradoraNombre = nombre;
    document.querySelectorAll('.staff-card').forEach(c => c.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    document.getElementById('btnStep2').disabled = false;
}

// ─── CALENDAR ───
function renderCal() {
    const y = state.calYear, m = state.calMonth;
    document.getElementById('calMonth').textContent = `${MESES[m]} ${y}`;
    const grid = document.getElementById('calGrid');
    const today = new Date(); today.setHours(0,0,0,0);

    let html = DIAS_LABEL.map(d => `<div class="cal-day-label">${d}</div>`).join('');

    const first = new Date(y, m, 1);
    let startDay = first.getDay();
    startDay = startDay === 0 ? 6 : startDay - 1; // adjust to Mon=0

    for (let i = 0; i < startDay; i++) html += `<div class="cal-day empty"></div>`;

    const days = new Date(y, m + 1, 0).getDate();
    for (let d = 1; d <= days; d++) {
        const dt = new Date(y, m, d);
        const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const maxDate = new Date(today); maxDate.setDate(maxDate.getDate() + 60);
        const isPast = dt < today;
        const isSun = dt.getDay() === 0;
        const isTooFar = dt > maxDate;
        const isToday = dt.toDateString() === today.toDateString();
        const isSel = state.fechaSel === iso;
        const disabled = isPast || isSun || isTooFar;
        let cls = 'cal-day';
        if (disabled) cls += ' disabled';
        else if (isSel) cls += ' selected';
        else if (isToday) cls += ' today';
        html += `<div class="${cls}" ${!disabled ? `onclick="selectDate('${iso}')"` : ''}>${d}</div>`;
    }
    grid.innerHTML = html;
}

function prevMonth() {
    if (state.calMonth === 0) { state.calMonth = 11; state.calYear--; }
    else state.calMonth--;
    renderCal();
}
function nextMonth() {
    if (state.calMonth === 11) { state.calMonth = 0; state.calYear++; }
    else state.calMonth++;
    renderCal();
}
function selectDate(iso) {
    state.fechaSel = iso;
    renderCal();
    document.getElementById('btnStep3').disabled = false;
}

// ─── SLOTS ───
async function loadSlots() {
    const el = document.getElementById('slotsContainer');
    el.innerHTML = '<div class="loading"><div class="spinner"></div>Buscando disponibilidad...</div>';
    document.getElementById('btnStep4').disabled = true;

    const params = new URLSearchParams({
        servicio_id: state.servicioSel.id,
        colaboradora_id: state.colaboradoraSel,
        fecha: state.fechaSel,
    });
    const res = await fetch(`/api/slots?${params}`);
    state.slotsData = await res.json();

    if (!state.slotsData.length) {
        el.innerHTML = '<div class="no-slots">No hay turnos disponibles para esta fecha.<br>Probá con otro día.</div>';
        return;
    }
    el.innerHTML = `<div class="slots-grid">${state.slotsData.map(s => `
        <div class="slot ${state.horaSel === s.hora ? 'selected' : ''}"
             onclick="selectSlot('${s.hora}', ${s.colaboradora_id})">${s.hora}</div>
    `).join('')}</div>`;
}

function selectSlot(hora, colabId) {
    state.horaSel = hora;
    state.colaboradoraFinalId = colabId;
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    document.getElementById('btnStep4').disabled = false;
}

// ─── SUMMARY ───
function renderSummary() {
    const fecha = new Date(state.fechaSel + 'T12:00:00');
    const fechaStr = fecha.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    const colab = state.colaboradoraSel === 'any' ? 'Cualquiera disponible' : state.colaboradoraNombre;
    document.getElementById('summaryBox').innerHTML = `
        <div class="summary-row"><span class="label">Servicio</span><span class="val">${state.servicioSel.nombre}</span></div>
        <div class="summary-row"><span class="label">Profesional</span><span class="val">${colab}</span></div>
        <div class="summary-row"><span class="label">Fecha</span><span class="val">${fechaStr}</span></div>
        <div class="summary-row"><span class="label">Horario</span><span class="val">${state.horaSel} hs · ${durStr(state.servicioSel.duracion_min)}</span></div>
        <div class="summary-row"><span class="label">Precio</span><span class="val summary-price">desde $${state.servicioSel.precio_desde.toLocaleString()} MXN</span></div>
    `;
}

// ─── CONFIRMAR ───
async function confirmar() {
    const nombre = document.getElementById('fNombre').value.trim();
    const tel = document.getElementById('fTel').value.trim();
    const politicas = document.getElementById('fPoliticas').checked;

    if (!nombre || !tel) { alert('Por favor completá nombre y teléfono.'); return; }
    if (!politicas) { alert('Necesitás aceptar las políticas del salón.'); return; }

    const btn = document.getElementById('btnConfirmar');
    btn.disabled = true;
    btn.textContent = 'Confirmando...';

    try {
        const res = await fetch('/api/reservar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nombre,
                apellido: document.getElementById('fApellido').value.trim(),
                telefono: tel,
                email: document.getElementById('fEmail').value.trim(),
                idioma: document.getElementById('fIdioma').value,
                fecha_nacimiento: document.getElementById('fNacimiento').value || null,
                notas: document.getElementById('fNotas').value.trim(),
                acepto_politicas: true,
                servicio_id: state.servicioSel.id,
                colaboradora_id: state.colaboradoraFinalId || state.colaboradoraSel,
                fecha: state.fechaSel,
                hora: state.horaSel,
            })
        });
        const data = await res.json();
        if (data.success) {
            const fecha = new Date(state.fechaSel + 'T12:00:00');
            const fechaStr = fecha.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long' });
            document.getElementById('confirmText').innerHTML =
                `Tu turno para <strong>${state.servicioSel.nombre}</strong> fue registrado para el<br>
                <strong>${fechaStr} a las ${state.horaSel} hs</strong>.<br><br>
                Te esperamos en Maru Nails — 27 Itzamna 12, Tulum.`;
            const waMsg = encodeURIComponent(
                `Hola! Confirmé mi reserva para *${state.servicioSel.nombre}* el ${fechaStr} a las ${state.horaSel} hs. Gracias! 💅`
            );
            document.getElementById('btnWhatsapp').href = `https://wa.me/${SALON_WA}?text=${waMsg}`;
            goStep('ok');
        } else {
            alert('Ocurrió un error: ' + (data.error || 'intentá nuevamente.'));
            btn.disabled = false;
            btn.textContent = 'Confirmar reserva';
        }
    } catch {
        alert('Error de conexión. Intentá nuevamente.');
        btn.disabled = false;
        btn.textContent = 'Confirmar reserva';
    }
}

function nueva() {
    state.servicioSel = null;
    state.colaboradoraSel = null;
    state.fechaSel = null;
    state.horaSel = null;
    document.getElementById('fNombre').value = '';
    document.getElementById('fApellido').value = '';
    document.getElementById('fTel').value = '';
    document.getElementById('fEmail').value = '';
    document.getElementById('fNotas').value = '';
    document.getElementById('fPoliticas').checked = false;
    goStep(1);
}

// ─── NAVIGATION ───
async function goStep(n) {
    const prev = state.currentStep;
    document.getElementById(prev === 'ok' ? 'stepOk' : `step${prev}`).classList.remove('active');

    if (n === 2) await loadStaff();
    if (n === 3) { state.calYear = new Date().getFullYear(); state.calMonth = new Date().getMonth(); renderCal(); }
    if (n === 4) await loadSlots();
    if (n === 5) renderSummary();

    state.currentStep = n;
    document.getElementById(n === 'ok' ? 'stepOk' : `step${n}`).classList.add('active');

    for (let i = 1; i <= 5; i++) {
        const dot = document.getElementById(`dot${i}`);
        if (!dot) continue;
        dot.classList.remove('active', 'done');
        if (typeof n === 'number') {
            if (i < n) dot.classList.add('done');
            else if (i === n) dot.classList.add('active');
        } else {
            dot.classList.add('done');
        }
    }
    window.scrollTo(0, 0);
}

function durStr(min) {
    if (min < 60) return `${min} min`;
    const h = Math.floor(min / 60), m = min % 60;
    return m ? `${h}h ${m}min` : `${h}h`;
}

init();
</script>
